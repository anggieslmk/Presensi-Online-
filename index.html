<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presensi Online Kelas 11 TKJ 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .bg-tech-blue { background-color: #0f172a; }
        .text-tech-blue { color: #0f172a; }
        .border-tech-blue { border-color: #0f172a; }
        .bg-mint { background-color: #10b981; }
        .bg-mint-hover { background-color: #059669; }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen">

    <header class="bg-tech-blue text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide">XI TKJ 1 <span class="text-emerald-400">Presensi Online</span></h1>
            <nav>
                <button onclick="switchTab('siswa')" id="btn-tab-siswa" class="px-4 py-2 rounded-md bg-emerald-500 text-white font-medium mr-2">Siswa</button>
                <button onclick="aksesGuru()" id="btn-tab-guru" class="px-4 py-2 rounded-md text-slate-300 hover:text-white font-medium">Guru</button>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-4xl mt-6">
        
        <section id="tab-siswa" class="bg-white rounded-2xl shadow-xl p-6 border-t-8 border-slate-950">
            <h2 class="text-2xl font-bold text-tech-blue mb-2">Isi Kehadiran Siswa</h2>
            <p class="text-slate-500 mb-6 text-sm">Silakan pilih nama Anda dan isi status kehadiran hari ini.</p>

            <form id="form-presensi" onsubmit="simpanPresensi(event)">
                <div class="mb-5">
                    <label class="block text-slate-700 font-semibold mb-2">Nama Lengkap</label>
                    <select id="nama-siswa" required class="w-full p-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50">
                        <option value="" disabled selected>-- Pilih Nama Anda --</option>
                        <option value="Adittia Nur Cahya">Adittia Nur Cahya</option>
                        <option value="Afrizal Prasetya">Afrizal Prasetya</option>
                        <option value="Anita Sugih Asih">Anita Sugih Asih</option>
                        <option value="Calista Yitriani">Calista Yitriani</option>
                        <option value="Chika Nur Carolina">Chika Nur Carolina</option>
                        <option value="Diaz Setiawan">Diaz Setiawan</option>
                        <option value="Dinda">Dinda</option>
                        <option value="Doni Dwi Candi Anan">Doni Dwi Candi Anan</option>
                        <option value="Efril Syah Nagaring">Efril Syah Nagaring</option>
                        <option value="Emillia Faizatuz Zahra">Emillia Faizatuz Zahra</option>
                        <option value="Fadil Akmal Arasyid">Fadil Akmal Arasyid</option>
                        <option value="Fajar Putra Pratama">Fajar Putra Pratama</option>
                        <option value="Fani Amelia">Fani Amelia</option>
                        <option value="Fani Sepfira Pangestika">Fani Sepfira Pangestika</option>
                        <option value="Febri Dwi Faozan">Febri Dwi Faozan</option>
                        <option value="Fiona Rahma Anindya">Fiona Rahma Anindya</option>
                        <option value="Helena Feiza Valen">Helena Feiza Valen</option>
                        <option value="Ismail Fauzan">Ismail Fauzan</option>
                        <option value="Jeni Nur Azizah">Jeni Nur Azizah</option>
                        <option value="Kelina Azalia">Kelina Azalia</option>
                        <option value="Khela Saputri">Khela Saputri</option>
                        <option value="Metta Aisiya">Metta Aisiya</option>
                        <option value="Muhamad Faqih Nurrokhim">Muhamad Faqih Nurrokhim</option>
                        <option value="Muhammad Izbat Ramadhan">Muhammad Izbat Ramadhan</option>
                        <option value="Nizrina Hanin Aulia">Nizrina Hanin Aulia</option>
                        <option value="Puji Sukma Astuti">Puji Sukma Astuti</option>
                        <option value="Ridho Rel Fano">Ridho Rel Fano</option>
                        <option value="Rizky Bagus Luthfiansyah">Rizky Bagus Luthfiansyah</option>
                        <option value="Widya Larasati">Widya Larasati</option>
                        <option value="Yanwar Reno Fajrian">Yanwar Reno Fajrian</option>
                        <option value="Zauky Fitra">Zauky Fitra</option>
                        <option value="Zulfitiana Anisa">Zulfitiana Anisa</option>
                    </select>
                </div>

                <div class="mb-5">
                    <label class="block text-slate-700 font-semibold mb-2">Status Kehadiran</label>
                    <div class="grid grid-cols-3 gap-4">
                        <label class="flex flex-col items-center justify-center p-4 border border-slate-300 rounded-xl cursor-pointer hover:bg-emerald-50 transition peer-checked:border-emerald-500 has-[:checked]:bg-emerald-50 has-[:checked]:border-emerald-500">
                            <input type="radio" name="status" value="Hadir" required onclick="toggleUploadLabel('foto')" class="accent-emerald-600 w-5 h-5 mb-2">
                            <span class="font-medium text-slate-700">Hadir</span>
                        </label>
                        <label class="flex flex-col items-center justify-center p-4 border border-slate-300 rounded-xl cursor-pointer hover:bg-emerald-50 transition has-[:checked]:bg-emerald-50 has-[:checked]:border-emerald-500">
                            <input type="radio" name="status" value="Izin" onclick="toggleUploadLabel('surat')" class="accent-emerald-600 w-5 h-5 mb-2">
                            <span class="font-medium text-slate-700">Izin</span>
                        </label>
                        <label class="flex flex-col items-center justify-center p-4 border border-slate-300 rounded-xl cursor-pointer hover:bg-emerald-50 transition has-[:checked]:bg-emerald-50 has-[:checked]:border-emerald-500">
                            <input type="radio" name="status" value="Sakit" onclick="toggleUploadLabel('surat')" class="accent-emerald-600 w-5 h-5 mb-2">
                            <span class="font-medium text-slate-700">Sakit</span>
                        </label>
                    </div>
                </div>

                <div class="mb-6">
                    <label id="label-bukti" class="block text-slate-700 font-semibold mb-2">Unggah Bukti Kehadiran / Surat Izin</label>
                    <input type="file" id="file-bukti" accept="image/*,.pdf" required class="w-full p-2 border border-slate-300 rounded-lg bg-slate-50 text-slate-600 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-slate-950 file:text-white hover:file:bg-slate-800 cursor-pointer">
                    <p class="text-xs text-slate-400 mt-1">Format: JPG, PNG, PDF. Maksimal 2MB.</p>
                </div>

                <button type="submit" id="btn-submit" class="w-full bg-mint text-white p-3 rounded-lg font-bold text-lg hover:bg-mint-hover transition shadow-md cursor-pointer">Kirim Presensi</button>
            </form>
        </section>

        <!-- Tambahkan URL Web App dari Google Apps Script di sini -->
        <script>
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz5FKLrWqtQtHH9i0io1x7m67s0auuLPJH_ao1WpGA7cgx05VcWmw_1AiSid7V2RfoF/exec";
            const KATA_SANDI_GURU = "gurutkj1";

            function aksesGuru() {
                const inputSandi = prompt("Masukkan kata sandi guru:");
                if (inputSandi === KATA_SANDI_GURU) {
                    alert("Akses diberikan. Karena Anda menggunakan Google Sheets, silakan lihat rekap langsung di Google Drive Anda.");
                } else if (inputSandi !== null) {
                    alert("Kata sandi salah!");
                }
            }

            function simpanPresensi(event) {
                event.preventDefault();
                
                const nama = document.getElementById('nama-siswa').value;
                const status = document.querySelector('input[name="status"]:checked').value;
                const fileInput = document.getElementById('file-bukti').files[0];
                
                if (!fileInput) return;

                document.getElementById('btn-submit').innerText = "Mengirim...";
                document.getElementById('btn-submit').disabled = true;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const fileBase64 = e.target.result;
                    const waktu = new Date().toLocaleString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit', day: '2-digit', month: 'short' });

                    const dataKirim = {
                        waktu: waktu,
                        nama: nama,
                        status: status,
                        fileData: fileBase64,
                        fileName: fileInput.name
                    };

                    fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dataKirim)
                    })
                    .then(() => {
                        alert('Presensi berhasil dikirim!');
                        document.getElementById('form-presensi').reset();
                        document.getElementById('btn-submit').innerText = "Kirim Presensi";
                        document.getElementById('btn-submit').disabled = false;
                    })
                    .catch(error => {
                        console.error('Error:', error);
                        alert('Gagal mengirim presensi.');
                        document.getElementById('btn-submit').innerText = "Kirim Presensi";
                        document.getElementById('btn-submit').disabled = false;
                    });
                };
                
                reader.readAsDataURL(fileInput);
            }

            function switchTab(tab) {
                const tabSiswa = document.getElementById('tab-siswa');
                const btnSiswa = document.getElementById('btn-tab-siswa');
                
                if (tab === 'siswa') {
                    tabSiswa.classList.remove('hidden');
                } else {
                    tabSiswa.classList.add('hidden');
                }
            }
        </script>
    </main>
</body>
</html>
